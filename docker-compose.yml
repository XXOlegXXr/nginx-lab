services:
  api-node-1:
    build: ./backend
    environment:
      - PORT=8080
      - SERVER_NAME=API_NODE_1

  api-node-2:
    build: ./backend
    environment:
      - PORT=8080
      - SERVER_NAME=API_NODE_2

  web-server:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - api-node-1
      - api-node-2
