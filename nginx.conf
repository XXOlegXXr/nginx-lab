user                 nginx;
worker_processes     auto;
worker_cpu_affinity  auto;
worker_rlimit_nofile 65535;
error_log            /var/log/nginx/error.log warn;
include              /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    charset                utf-8;
    sendfile               on;
    tcp_nopush             on;
    tcp_nodelay            on;
    server_tokens          off;
    log_not_found          off;
    types_hash_max_size    2048;
    types_hash_bucket_size 64;
    client_max_body_size   16M;

    include                mime.types;
    default_type           application/octet-stream;

    access_log             /var/log/nginx/access.log;
    error_log              /var/log/nginx/error.log warn;

    ssl_session_timeout    1d;
    ssl_session_cache      shared:SSL:10m;
    ssl_session_tickets    off;

    ssl_dhparam            /etc/nginx/dhparam.pem;

    ssl_protocols          TLSv1.2 TLSv1.3;
    ssl_ciphers            ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

    ssl_stapling           on;
    ssl_stapling_verify    on;
    resolver               1.1.1.1 1.0.0.1 8.8.8.8 8.8.4.4 208.67.222.222 208.67.220.220 valid=60s;
    resolver_timeout       2s;
    # для сайтів на мому хості
    include                /etc/nginx/conf.d/*.conf;
    include                /etc/nginx/sites-enabled/*;
    # Compress trafic
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:10m max_size=500m inactive=60m use_temp_path=off;

    server {
        listen 80;
        server_name nginx-lab;

        location / {

            root  /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ =404;

    }


        location /api/ {
            proxy_pass         http://go_api_servers;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_cache        api_cache;
            proxy_cache_valid  200 5s;
            add_header         X-Cache-Status $upstream_cache_status;
            proxy_hide_header 'Access-Control-Expose-Headers';
            add_header        'Access-Control-Expose-Headers' 'X-Cache-Status' always;
    }
}
    upstream go_api_servers {
        server api-node-1:8080;
        server api-node-2:8080;
    }



}
