<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Практика Nginx</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; background: #f4f4f9; }
        .card { background: white; padding: 20px; display: inline-block; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); min-width: 300px; }
        h1 { color: #333; }
        .meta { font-size: 1.1em; color: #666; margin: 10px 0; }
        .time { color: #e74c3c; font-weight: bold; }
        button { padding: 10px 20px; font-size: 1srem; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #2980b9; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Nginx + Go API</h1>
        <p class="meta">Сервер: <strong id="server-name">Завантаження...</strong></p>
        <p class="meta">Час з API: <span id="server-time" class="time">--:--:--</span></p>
        <p class="meta">Статус кешу: <strong id="cache-status" style="color: green;">--</strong></p>
        <button onclick="fetchData()">Оновити дані (API)</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
